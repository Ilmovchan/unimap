services:
  server:
    image: unimap-server
    build:
      context: .
      dockerfile: server/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ExternalApis__MapTiler__ApiKey: "ТВОЙ_MAPTILER_API_KEY"

    expose:
      - "8080"

    ports:
      - "5286:8080"

    volumes:
      - server-pictures:/app/pictures

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started

  # admin-panel:
  #   image: unimap-admin-panel
  #   build:
  #     context: ./admin-web
  #     dockerfile: Dockerfile

  #   expose:
  #     - "80"

  #   ports:
  #     - "5173:80"

  #   depends_on:
  #     - server

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: unimap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d unimap
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine

    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
  server-pictures:

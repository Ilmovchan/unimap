services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unimap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unimap"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    ports:
      - "5286:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=unimap;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-in-production-min-32-chars!!}
      ExternalApis__MapTiler__ApiKey: ${MAPTILER_API_KEY:-}
      ExternalApis__OpenRouteService__ApiKey: ${ORS_API_KEY:-}
      Cors__Origins__0: http://localhost:5173
      Cors__Origins__1: http://127.0.0.1:5173
      Cors__Origins__2: http://localhost:8081
      Cors__Origins__3: http://localhost:19006
      Pictures__PublicBaseUrl: http://localhost:5286
    volumes:
      - server_pictures:/app/pictures
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

  # Metro / Expo dev server (симулятор або dev client на хості підключаються до :8081)
  mobile-app:
    build:
      context: ./apps/mobile-app
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_PUBLIC_UNIMAP_SERVER_API_LINK: ${EXPO_PUBLIC_UNIMAP_SERVER_API_LINK:-http://localhost:5286/api}
      EXPO_PUBLIC_UNIMAP_SERVER_DEV_HOST: ${EXPO_PUBLIC_UNIMAP_SERVER_DEV_HOST:-}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    volumes:
      - ./apps/mobile-app:/app
      - mobile_app_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - server
    restart: unless-stopped

  # Одноразово: docker compose --profile setup run --rm db-migrate
  db-migrate:
    profiles: [setup]
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    volumes:
      - ./apps/server:/src
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=unimap;Username=postgres;Password=postgres
    entrypoint:
      - sh
      - -c
      - |
        dotnet tool install --global dotnet-ef --version 9.0.6
        export PATH="$$PATH:/root/.dotnet/tools"
        dotnet ef database update --project persistence/persistence.csproj --startup-project api/api.csproj
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  server_pictures:
  mobile_app_node_modules:
